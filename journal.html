<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Re:Story 声のジャーナル</title>
<link rel="manifest" href="manifest-journal.webmanifest">
<meta name="theme-color" content="#141b2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="声ジャーナル">
<link rel="apple-touch-icon" href="icon-journal-apple.png">
<link rel="icon" type="image/png" href="icon-journal-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --night:#141b2e; --night2:#1c2540;
  --thread:#7fa8d9; --thread-dim:#3a4a6e;
  --ink:#e8ecf4; --ink-dim:#8b96ad; --accent:#c9d9f0;
  --rec:#e08a8a;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  background:radial-gradient(120% 90% at 50% 0%, var(--night2) 0%, var(--night) 60%);
  color:var(--ink); font-family:'Zen Kaku Gothic New',sans-serif;
  min-height:100dvh; display:flex; flex-direction:column; align-items:center;
  padding:20px 16px calc(20px + env(safe-area-inset-bottom));
}
header{text-align:center;margin-bottom:14px}
.brand{font-size:11px;letter-spacing:.35em;color:var(--ink-dim);text-transform:uppercase}
h1{font-family:'Shippori Mincho',serif;font-weight:600;font-size:19px;letter-spacing:.12em;margin-top:6px;color:var(--accent)}

.panel{width:100%;max-width:440px;display:flex;flex-direction:column;gap:12px}

.settings{display:flex;gap:8px}
.settings label{flex:1;display:flex;flex-direction:column;gap:4px;font-size:11px;color:var(--ink-dim);letter-spacing:.05em}
.settings input{
  background:rgba(127,168,217,.07);border:1px solid var(--thread-dim);border-radius:10px;
  color:var(--ink);font-family:inherit;font-size:14px;padding:9px 12px;outline:none;
}
.settings input:focus{border-color:var(--thread)}

textarea{
  width:100%;min-height:38dvh;resize:vertical;
  background:rgba(127,168,217,.06);border:1px solid var(--thread-dim);border-radius:14px;
  color:var(--ink);font-family:inherit;font-size:15.5px;line-height:1.9;
  padding:14px;outline:none;
}
textarea:focus{border-color:var(--thread)}
.interim{font-size:13px;color:var(--ink-dim);min-height:1.6em;padding:0 4px;font-style:italic}
.meta{display:flex;justify-content:space-between;font-size:11.5px;color:var(--ink-dim);padding:0 4px}

.microw{display:flex;justify-content:center;margin:4px 0}
.mic{
  width:76px;height:76px;border-radius:50%;cursor:pointer;
  border:1px solid var(--thread);
  background:linear-gradient(180deg,var(--accent),var(--thread));
  color:var(--night);font-family:'Shippori Mincho',serif;font-weight:600;
  font-size:14px;letter-spacing:.1em;
  display:flex;align-items:center;justify-content:center;
  transition:all .25s;
}
.mic.rec{
  background:transparent;color:var(--rec);border-color:var(--rec);
  animation:pulse 1.6s ease-in-out infinite;
}
@keyframes pulse{
  0%,100%{box-shadow:0 0 0 0 rgba(224,138,138,.35)}
  50%{box-shadow:0 0 0 14px rgba(224,138,138,0)}
}

.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.actions button{
  border:1px solid var(--thread-dim);border-radius:12px;background:transparent;
  color:var(--ink);font-family:inherit;font-size:13.5px;font-weight:500;
  padding:13px 8px;cursor:pointer;letter-spacing:.05em;transition:border-color .2s;
}
.actions button:active{border-color:var(--thread)}
.actions .primary{
  border-color:var(--thread);background:rgba(127,168,217,.12);
}
.actions .ghost{color:var(--ink-dim)}
.toast{
  position:fixed;bottom:calc(24px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);
  background:var(--night2);border:1px solid var(--thread);border-radius:999px;
  color:var(--ink);font-size:13px;padding:10px 20px;opacity:0;pointer-events:none;
  transition:opacity .3s;white-space:nowrap;
}
.toast.show{opacity:1}
.note{font-size:11.5px;color:var(--ink-dim);line-height:1.8;padding:0 4px}
</style>
</head>
<body>

<header>
  <div class="brand">Re:Story</div>
  <h1>声のジャーナル</h1>
</header>

<div class="panel">
  <div class="settings">
    <label>Vault名
      <input id="vault" placeholder="例: MyVault">
    </label>
    <label>デイリーノート名
      <input id="daily">
    </label>
  </div>

  <textarea id="text" placeholder="マイクを押して話すか、ここに直接書く。&#10;（iOSはキーボードのマイクでも入力できます）"></textarea>
  <div class="interim" id="interim"></div>
  <div class="meta"><span id="stat">待機中</span><span id="chars">0字</span></div>

  <div class="microw">
    <button class="mic" id="mic">録音</button>
  </div>

  <div class="actions">
    <button class="primary" id="toDaily">デイリーに追記</button>
    <button class="primary" id="toNew">新規ノートで保存</button>
    <button class="primary" id="toMemo">メモに送る</button>
    <button id="copy">コピー</button>
    <button class="ghost" id="clear">クリア</button>
  </div>

  <p class="note">「デイリーに追記」は<b>Advanced URI プラグイン</b>が必要です（PC・スマホ両方に入れると、今日のデイリーノートへ確実に追記されます）。「新規ノートで保存」はプラグイン不要。「メモに送る」は共有メニューからApple Notesなど普通のメモアプリへ（Obsidian不要）。Vault名は一度入れればブックマークで保持されます。</p>
</div>

<div class="toast" id="toast"></div>

<script>
const $=id=>document.getElementById(id);
const textEl=$('text'), interimEl=$('interim'), statEl=$('stat'),
      charsEl=$('chars'), micBtn=$('mic'), toastEl=$('toast'),
      vaultEl=$('vault'), dailyEl=$('daily');

/* ---- 日付ユーティリティ ---- */
const now=new Date();
const pad=n=>String(n).padStart(2,'0');
const ymd=now.getFullYear()+'-'+pad(now.getMonth()+1)+'-'+pad(now.getDate());
const hm=pad(now.getHours())+':'+pad(now.getMinutes());
dailyEl.value=ymd;

/* ---- Vault名はURLパラメータで保持（ブックマーク運用） ---- */
const params=new URLSearchParams(location.search);
if(params.get('vault')) vaultEl.value=params.get('vault');
vaultEl.addEventListener('change',()=>{
  const p=new URLSearchParams(location.search);
  p.set('vault',vaultEl.value.trim());
  history.replaceState(null,'','?'+p.toString());
});

/* ---- 文字数 ---- */
function updateChars(){ charsEl.textContent=textEl.value.length+'字'; }
textEl.addEventListener('input',updateChars);

/* ---- 音声認識 ---- */
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
let rec=null, recording=false;

if(SR){
  rec=new SR();
  rec.lang='ja-JP';
  rec.continuous=true;
  rec.interimResults=true;
  rec.onresult=e=>{
    let interim='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      const r=e.results[i];
      if(r.isFinal){
        let t=r[0].transcript.trim();
        if(t){
          textEl.value+=(textEl.value&&!textEl.value.endsWith('\n')?'':'')+t+'。\n';
          updateChars();
          textEl.scrollTop=textEl.scrollHeight;
        }
      }else{
        interim+=r[0].transcript;
      }
    }
    interimEl.textContent=interim;
  };
  rec.onend=()=>{
    // モバイルは勝手に切れるので、録音中なら再開
    if(recording){ try{rec.start()}catch(e){} }
    else{ statEl.textContent='待機中'; }
  };
  rec.onerror=e=>{
    if(e.error==='not-allowed'){
      recording=false; micBtn.classList.remove('rec'); micBtn.textContent='録音';
      statEl.textContent='マイクが許可されていません';
    }
  };
}else{
  micBtn.disabled=true;
  micBtn.style.opacity=.4;
  statEl.textContent='このブラウザは音声認識非対応。キーボードのマイクを使ってください';
}

micBtn.onclick=()=>{
  if(!rec) return;
  if(recording){
    recording=false;
    rec.stop();
    micBtn.classList.remove('rec');
    micBtn.textContent='録音';
    interimEl.textContent='';
  }else{
    recording=true;
    try{rec.start()}catch(e){}
    micBtn.classList.add('rec');
    micBtn.textContent='停止';
    statEl.textContent='聞いています…';
  }
};

/* ---- Obsidian連携 ---- */
function toast(msg){
  toastEl.textContent=msg;
  toastEl.classList.add('show');
  setTimeout(()=>toastEl.classList.remove('show'),2200);
}
function getBody(){
  const t=textEl.value.trim();
  if(!t){ toast('本文が空です'); return null; }
  return t;
}
function vaultParam(){
  const v=vaultEl.value.trim();
  return v?('vault='+encodeURIComponent(v)+'&'):'';
}

// デイリーノートに追記（Advanced URI: daily=true でObsidian設定のフォルダ/テンプレを尊重して今日のデイリーへ追記）
$('toDaily').onclick=()=>{
  const t=getBody(); if(!t) return;
  const d=new Date();
  const nowhm=pad(d.getHours())+':'+pad(d.getMinutes());
  const content='\n## '+nowhm+' 声のジャーナル\n'+t+'\n';
  const uri='obsidian://advanced-uri?'+vaultParam()
    +'daily=true&mode=append'
    +'&data='+encodeURIComponent(content);
  location.href=uri;
};

// 新規ノート（Journal/日付 時刻）
$('toNew').onclick=()=>{
  const t=getBody(); if(!t) return;
  const name='Journal/'+ymd+' '+hm.replace(':','');
  const content='---\ndate: '+ymd+' '+hm+'\ntags: [journal, voice]\n---\n\n'+t+'\n';
  const uri='obsidian://new?'+vaultParam()
    +'name='+encodeURIComponent(name)
    +'&content='+encodeURIComponent(content);
  location.href=uri;
};

// メモに送る（共有シート → Apple Notes等。Obsidian不要）
$('toMemo').onclick=async ()=>{
  const t=getBody(); if(!t) return;
  const d=new Date();
  const stamp=d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+' '+pad(d.getHours())+':'+pad(d.getMinutes());
  const payload='声のジャーナル '+stamp+'\n\n'+t;
  if(navigator.share){
    try{ await navigator.share({text:payload}); }
    catch(e){ /* ユーザーがキャンセル時は何もしない */ }
  }else{
    try{ await navigator.clipboard.writeText(payload); toast('コピーしました。メモに貼り付けてください'); }
    catch(e){ textEl.select(); document.execCommand('copy'); toast('コピーしました'); }
  }
};

$('copy').onclick=async ()=>{
  const t=getBody(); if(!t) return;
  try{ await navigator.clipboard.writeText(t); toast('コピーしました'); }
  catch(e){ textEl.select(); document.execCommand('copy'); toast('コピーしました'); }
};

$('clear').onclick=()=>{
  if(!textEl.value) return;
  if(confirm('本文を消しますか？')){ textEl.value=''; updateChars(); }
};

updateChars();
</script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));
}
</script>
</body>
</html>
